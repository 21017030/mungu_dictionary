        /*메인 페이지 슬라이더 구현 부분 */
        #content-main{
            width:1300px;

            display:inline-block;

            width: 4400px;  /* 이미지를 추가할때 이부분을 늘려야 함(1100px * 이미지 개수) */

        }
        #content-title{
            width: 600px;

        }
        #content-title > #big-title{
            font-size: 100px;

            display:none; /*애니메이션을 적용하기 위해 처음에는 안 보이게 설정 */

        #content-title > #small-title{

            margin:20px 0;
            display:none;

        #slider-button-left, #slider-button-right{

            height: 200px;
            font-size: 40px;
            font-weight:bold;
            cursor:pointer;
            opacity:0.6;
        }
        #slider-button-left{
            left:0;
        }
        #slider-button-right{
            right:0;
        }
        #slider-button-left:hover, #slider-button-right:hover{
            opacity:1.0;
        }
        /*하단 버튼 구현 부분 */

        .category{

            transition: 0.4s; /* 마우스 올렸을 때 부드럽게 변하도록 해주는 속성 */
        }
        .category:hover{
            transform: scale(1.1);
            background-color: rgb(240, 240, 240);
        }
        .category:active{ /* 클릭했을 때 */
            transform: scale(0.95);
            transition: 0.06s;
        }

        function firstCategorySelect(){ // 대분류 선택 시 소분류 에 정보를 넣음 및 수정
            const firstCategory = document.getElementById('first-category-select');
            const secondCategory = document.getElementById('second-category-select');
5
            const selected = firstCategory.value;
            secondCategory.innerHTML = '<option value="">선택</option>'; //기존 옵션 초기화

            // 대분류를 아직 안 골랐거나, 해당 소분류 리스트가 없으면 끝
            if (!selected || !secondCategoryUrls[selected]) return;

            const options = secondCategoryUrls[selected];
            let optionHtml = '';
            for (let i in options){
                optionHtml += '<option value=' + options[i].url + '>' + options[i].text + '</option>';
            }
            secondCategory.innerHTML += optionHtml;
        }

        function categoryMove(){ //이동 버튼 클릭
            const firstCategory = document.getElementById('first-category-select');
            const secondCategory = document.getElementById('second-category-select');

            const selected = firstCategory.value;
            const sub = secondCategory.value;
            if(selected ==""){
                alert("먼저 대분류부터 선택해주세요.");
                return;
            }
            if(sub ==""){
                window.location.href = firstCategoryUrls[selected];
            }
            if(sub !=""){
                window.location.href = secondCategory.value;
            }

        }

        // 슬라이더 구현 부분
        $(document).ready(function(){
            let count = $('div.content').length; // 총 이미지 개수
            let currentIndex = 0; // 현재 이미지 인덱스
            let clickedButton = false; //버튼 클릭 여부 확인 변수
            //페이지 이동(600ms 동안 left값을 변경)
            let changePicture = function(){
                $('.content-container').animate({left: -1100 * currentIndex}, 500); //left를 마이너스로 준다면 오른쪽으로 이동
            }
            //이벤트 연결
            $('#slider-button-left').click(function(){
                if(currentIndex > 0){
                    currentIndex = currentIndex - 1;
                    clickedButton = true;
                    changePicture();
                }
                //가장 첫번째 이미지에서 왼쪽 버튼 클릭 시 마지막 이미지로 이동
                else if(currentIndex == 0){
                    currentIndex = count -1;
                    clickedButton = true;
                    changePicture();
                }
            });
            $('#slider-button-right').click(function(){
                if(currentIndex < count -1){
                    currentIndex = currentIndex + 1;
                    clickedButton = true; //버튼 클릭 여부 true로 변경
                    changePicture();
                }
                //가장 마지막 이미지에서 오른쪽 버튼 클릭 시 첫번째 이미지로 이동
                else if(currentIndex == count - 1){
                    currentIndex = 0;
                    clickedButton = true; //버튼 클릭 여부 true로 변경
                    changePicture();
                }
            });

            //자동 슬라이더
            setInterval(function(){
                if(!clickedButton){ //버튼 클릭이 없을 때만 자동 슬라이더 작동(오른쪽 이동 방향)
                    if(currentIndex < count -1){
                        currentIndex = currentIndex + 1;
                        changePicture();
                    }
                    else if(currentIndex == count - 1){
                        currentIndex = 0;
                        changePicture();
                    }
                }
                else{
                    //버튼 클릭 후 10초 뒤에 자동 슬라이더 재작동
                    setTimeout(function(){ // 특정 시간이 지난 다음에 코드를 실행하는 함수입니다. 자바스크립트 코드에 일종의 타이머를 설정하는 것입니다.
                        clickedButton = false; 
                    }, 10000);
                }
            }, 5000); //5초마다 슬라이더 변경
        });

        // 제목 꾸미기
        $(document).ready(function(){
            $('#big-title').slideDown(700); //슬라이드 효과와 함께 표시
            $('#small-title').delay(900).fadeIn(800); //1초 후에 선명해지면서 나타남
        })

    </script>
