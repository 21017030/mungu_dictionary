<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모노 스텐다드</title>
    <link rel="stylesheet" href="../../tabDesign/mainTab.css">
    <link rel="stylesheet" href="../background/backgroundStyle.css"> <!-- 배경화면 디자인 -->
    <link rel="stylesheet" href="../categorySource/textBodyStyle.css"> <!-- 본문 내용 디자인 -->
    <link rel="stylesheet" href="../productSource/productStyle.css"> <!--모든 상품들이 이 스타일을 사용하기 때문에 따로 둠-->
    <link rel="stylesheet" href="../homebutton/homebuttonStyle.css"> <!-- 홈 버튼 디자인 -->
    <script src="../../tabClock/tabClock.js"></script>
    <script src="../productSource/productMethod.js"></script>
</head>
<body>
    <div class="top">
        <a href="../../main.html">
            <img src="../../image/logoimage.png">
        </a>
        <ul class="label">
            <li class="tab"><a href="../mechanicalPencilCategory.html">샤프</a></li>
            <li class="tab"><a href="../ballpointPenCategory.html">볼펜</a></li>
            <li class="tab"><a href="../fountainPenCategory.html">만년필</a></li>
            <li class="tab"><a href="../notebookCategory.html">공책</a></li>
            <li class="tab"><a href="../eraserCategory.html">지우개</a></li>
        </ul>
    </div>

    <div class = "second">
        <div class="search">
        </div>
    </div>

    <div id="time">
        <p id="year_month_day_week"></p>
        <p id="hour_minute_second"></p>
    </div>
    <!--홈 버튼 부분-->
    <a href="../../main.html">
        <div id="home">
            <img id="home-button" src="../homebutton/home.png">
            <h2>홈으로</h2>
        </div>
    </a>
    <div id="text-body">
        <p id="title">상세 정보</p>
        <hr>
        <div id="product-container">
        <img id="product" src="../image/tombowstandard.png" alt="모노 스텐다드 이미지">
        <p id="product-name"></p>
        <p id="product-name">모노 스텐다드</p>
        <table id="info">
            <tr>
                <th>브랜드</th>
                <td><a href="http://www.tombowpencil.co.kr/"><img src="../brandlogo/tombow_logo.png" alt="톰보우 로고" width="360" height="110"></a>
                    <p>톰보우</p></td>
            </tr>
            <tr>
                <th>사이즈</th>
                <td>23mm * 55mm * 11mm (가로 * 세로 * 두께)</td>
            </tr>
            <tr>
                <th>제조국</th>
                <td>일본</td>
            </tr>
            <tr>
                <th>색상</th>
                <td id="color">
                    <div class="fig" style="background:rgb(255, 255, 255); border:1px solid black;"></div><span>화이트</span>
                </td>
            </tr>
        </table>
        </div>

        <div id="description">
            <h1 align="center">제품 특징</h1>
            <ul>
                <li>뚸어난 성능으로 필기한 내용을 깨끗이 수정 가능</li>
                <li>1969년 출시 이후 일본의 국민 지우개로 불리며 일본 시장 점유율 1위를 기록</li>
            </ul>
        </div>

        <div id="select-product">
            <h3 align="center">제품 사진(다른 색상이 없음)</h3><br>
            <input class="select-button" onclick="selectProduct(this, './image/monostandardpicture.png')" type="button" value="다른 이미지">
            <input class="select-button" onclick="selectProduct(this, './image/monostandardbox.png')" type="button" value="한 상자">
            <div id="selected-image">
                <img id="show" src="https://dummyimage.com/700x500/fff&text=Select+Picture" width="700px" alt="선택된 제품 이미지">
                <!--더미 이미지에 원하는 텍스트를 넣을 수 있다(한국어는 불가)-->
            </div>
        </div>

        <input type="button" id="back-button" value="뒤로 가기" onclick="location.href='../eraserCategory.html'">
    </div>


</body>
</html>
