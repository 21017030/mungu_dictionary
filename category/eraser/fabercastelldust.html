<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더스트프리</title>
    <link rel="stylesheet" href="../../tabDesign/mainTab.css">
    <link rel="stylesheet" href="../background/backgroundStyle.css"> <!-- 배경화면 디자인 -->
    <link rel="stylesheet" href="../categorySource/textBodyStyle.css"> <!-- 본문 내용 디자인 -->
    <link rel="stylesheet" href="../productSource/productStyle.css"> <!--모든 상품들이 이 스타일을 사용하기 때문에 따로 둠-->
    <link rel="stylesheet" href="../homebutton/homebuttonStyle.css"> <!-- 홈 버튼 디자인 -->
    <script src="../../tabClock/tabClock.js"></script>
    <script src="../productSource/productMethod.js"></script>
</head>
<body>
    <div class="top">
        <a href="../../main.html">
            <img src="../../image/logoimage.png">
        </a>
        <ul class="label">
            <li class="tab"><a href="../mechanicalPencilCategory.html">샤프</a></li>
            <li class="tab"><a href="../ballpointPenCategory.html">볼펜</a></li>
            <li class="tab"><a href="../fountainPenCategory.html">만년필</a></li>
            <li class="tab"><a href="../notebookCategory.html">공책</a></li>
            <li class="tab"><a href="../eraserCategory.html">지우개</a></li>
        </ul>
    </div>

    <div class = "second">
    </div>

    <div id="time">
        <p id="year_month_day_week"></p>
        <p id="hour_minute_second"></p>
    </div>
    <!--홈 버튼 부분-->
    <a href="../../main.html">
        <div id="home">
            <img id="home-button" src="../homebutton/home.png">
            <h2>홈으로</h2>
        </div>
    </a>
    <div id="text-body">
        <p id="title">상세 정보</p>
        <hr>
        <div id="product-container">
        <img id="product" src="../image/fabercastelldust.png" alt="더스트프리 이미지">
        <p id="product-name"></p>
        <p id="product-name">더스트프리</p>
        <table id="info">
            <tr>
                <th>브랜드</th>
                <td><a href="http://www.faber-castell.co.kr/"><img src="../brandlogo/fabercastell_logo.png" alt="파버카스텔 로고" width="320" height="90"></a>
                    <p>파버카스텔</p></td>
            </tr>
            <tr>
                <th>사이즈</th>
                <td>20mm * 62mm * 12mm (가로 * 세로 * 두께)</td>
            </tr>
            <tr>
                <th>제조국</th>
                <td>인도네시아</td>
            </tr>
            <tr>
                <th>색상</th>
                <td id="color">
                    <div class="fig" style="background:rgb(255, 255, 255); border:1px solid black;"></div><span>화이트</span>
                    <div class="fig" style="background:rgb(0, 0, 0)"></div><span>블랙</span>
                    <div class="fig" style="background:rgb(26, 92, 152)"></div><span>블루</span>
                </td>
            </tr>
        </table>
        </div>

        <div id="description">
            <h1 align="center">제품 특징</h1>
            <ul>
                <li>부드러운 사용감의 무독성 지우개</li>
                <li>지우개 모서리 라운딩 처리, 잘 부러지지 않음</li>
                <li>번지거나 얼룩이 생기지 않음</li>
                <li>지우개 가루가 한 줄로 뭉침</li> 
            </ul>
        </div>

        <div id="select-product">
            <h3 align="center">제품 사진</h3><br>
            <input class="select-button" onclick="selectProduct(this, './image/dustfreewhite.png')" type="button" value="화이트">
            <input class="select-button" onclick="selectProduct(this, './image/dustfreeblack.png')" type="button" value="블랙">
            <input class="select-button" onclick="selectProduct(this, './image/dustfreeblue.png')" type="button" value="블루">
            <div id="selected-image">
                <img id="show" src="https://dummyimage.com/700x500/fff&text=Select+Picture" height="500px" alt="선택된 제품 이미지">
                <!--더미 이미지에 원하는 텍스트를 넣을 수 있다(한국어는 불가)-->
            </div>
        </div>



        <input type="button" id="back-button" value="뒤로 가기" onclick="location.href='../eraserCategory.html'">
    </div>


</body>
</html>
