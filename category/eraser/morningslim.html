<body>
    <div class="top">
        <a href="../../main.html">
            <img src="../../image/logoimage.png">
        </a>
        <ul class="label">
            <li class="tab"><a href="../mechanicalPencilCategory.html">샤프</a></li>
            <li class="tab"><a href="../ballpointPenCategory.html">볼펜</a></li>
            <li class="tab"><a href="../fountainPenCategory.html">만년필</a></li>

        </div>

    <div id="text-body">
        <p id="title">상세 정보</p>

        <div id="product-container">
        <img id="product" src="../image/morningslim.png" alt="500 슬림 라인 지우개 4mm 이미지">
        <p id="product-name"></p>
        <p id="product-name">500 슬림 라인 지우개 4mm</p>
        <table id="info">
            <tr>
                <th>브랜드</th>
                <td><a href="http://www.morningglory.co.kr/"><img src="../brandlogo/morningglory_logo.png" alt="모닝글로리 로고" width="320" height="90"></a>
                    <p>모닝글로리</p></td>
            </tr>
            <tr>
                <th>사이즈</th>
                <td>18mm * 65mm * 5mm (가로 * 세로 * 두께)</td>
            </tr>
            <tr>
                <th>제조국</th>
                <td>대한민국</td>
            </tr>
            <tr>
                <th>색상</th>
                <td id="color">
                    <div class="fig" style="background:rgb(255, 255, 255); border: 1px solid black;"></div><span>화이트</span>
                </td>
            </tr>
        </table>
        </div>

        <div id="description">
            <h1 align="center">제품 특징</h1>
            <ul>
                <li>세밀하게 지우기가 가능하도록 얇게 제작된 슬림라인 지우개</li>
                <li>여기서 소개한 것 중에서는 가장 얇음(내 의견)</li>
            </ul>
        </div>

        <div id="select-product">
            <h3 align="center">제품 사진(다른 색상이 없음)</h3><br>
            <input class="select-button" onclick="selectProduct(this, './image/slimpicture.png')" type="button" value="다른 사진">
            <input class="select-button" onclick="selectProduct(this, './image/slim1box.png')" type="button" value="한 상자">
            <input class="select-button" onclick="selectProduct(this, './image/slimsize.png')" type="button" value="크기">
            <div id="selected-image">
                <img id="show" src="https://dummyimage.com/700x500/fff&text=Select+Picture" height="500px" alt="선택된 제품 이미지">
                <!--더미 이미지에 원하는 텍스트를 넣을 수 있다(한국어는 불가)-->
            </div>
        </div>



        <input type="button" id="back-button" value="뒤로 가기" onclick="location.href='../eraserCategory.html'">
