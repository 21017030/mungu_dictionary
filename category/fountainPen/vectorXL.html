    <link rel="stylesheet" href="../categorySource/textBodyStyle.css"> <!-- 본문 내용 디자인 -->
    <link rel="stylesheet" href="../productSource/productStyle.css"> <!--모든 상품들이 이 스타일을 사용하기 때문에 따로 둠-->
    <link rel="stylesheet" href="../homebutton/homebuttonStyle.css"> <!-- 홈 버튼 디자인 -->
    <script src="../../tabClock/tabClock.js"></script>
    <script src="../productSource/productMethod.js"></script>
</head>
<body>
    <div class="top">
        <a href="../../main.html">
            <img src="../../image/logoimage.png">
        </a>
        <ul class="label">
            <li class="tab"><a href="../mechanicalPencilCategory.html">샤프</a></li>
            <li class="tab"><a href="../ballpointPenCategory.html">볼펜</a></li>
            <li class="tab"><a href="../fountainPenCategory.html">만년필</a></li>
            <li class="tab"><a href="../notebookCategory.html">공책</a></li>
            <li class="tab"><a href="../eraserCategory.html">지우개</a></li>
        </ul>
    </div>

    <div class = "second">
    </div>

    <div id="time">
        <p id="year_month_day_week"></p>
        <p id="hour_minute_second"></p>
    </div>
    <!--홈 버튼 부분-->
    <a href="../../main.html">
        <div id="home">
            <img id="home-button" src="../homebutton/home.png">
            <h2>홈으로</h2>
        </div>
    </a>
    <div id="text-body">
        <p id="title">상세 정보</p>
        <hr>
        <div id="product-container">
        <img id="product" src="../image/vectorXL.png" alt="벡터XL 만년필 이미지">
        <p id="product-name"></p>
        <p id="product-name">벡터XL</p>
        <table id="info">
            <tr>
                <th>브랜드</th>
                <td><a href="https://www.parker.co.kr/index.html"><img src="../brandlogo/parker_logo.png" alt="파카 로고" width="320" height="200"></a>
                    <p>파카</p></td>
            </tr>
            <tr>
                <th>사이즈</th>
                <td>12mm * 135mm (두깨 * 길이)</td>
            </tr>
            <tr>
                <th>무게</th>
                <td>17g</td>
            </tr>
            <tr>
                <th>닙 종류</th>
                <td>F촉</td>
            </tr>
            <tr>
                <th>닙 재질</th>
                <td>스테인리스 스틸</td>
            </tr>
            <tr>
                <th>제조국</th>
                <td>프랑스</td>
            </tr>
            <tr>
                <th>색깔 종류</th>
                <td id="color">
                    <div class="fig" style="background:rgb(0, 0, 0)"></div><span>블랙</span>
                    <div class="fig" style="background:rgb(169, 172, 185)"></div><span>메탈릭실버</span>
                </td>
            </tr>
        </table>
        </div>

        <div id="description">
            <h1 align="center">제품 특징</h1>
            <ul>
                <li>클래식한 벡터의 디자인을 유지하면서 더욱 커진 바디와 펜촉으로 업그레이드</li>
                <li>향상된 필기감과 그립감을 제공</li>
                <li>뛰어난 내구성의 스테인리스스틸</li>
            </ul>
        </div>

        <div id="select-product">
            <h3 align="center">제품 사진</h3><br>
            <input class="select-button" onclick="selectProduct(this, './image/vectorXLblack.png')" type="button" value="블랙"><!--버튼 클릭시 자기 객체 넣기-->
            <input class="select-button" onclick="selectProduct(this, './image/vectorXLsilver.png')" type="button" value="메탈릭실버">
            <div id="selected-image">
                <img id="show" src="https://dummyimage.com/700x500/fff&text=Select+Picture" height="500px" alt="선택된 제품 이미지">
                <!--더미 이미지에 원하는 텍스트를 넣을 수 있다(한국어는 불가)-->
            </div>
        </div>
        

        <input type="button" id="back-button" value="뒤로 가기" onclick="location.href='../fountainPenCategory.html'">
    </div>
