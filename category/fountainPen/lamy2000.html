<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라미 2000</title>
    <link rel="stylesheet" href="../../tabDesign/mainTab.css">
    <link rel="stylesheet" href="../background/backgroundStyle.css"> <!-- 배경화면 디자인 -->
    <link rel="stylesheet" href="../categorySource/textBodyStyle.css"> <!-- 본문 내용 디자인 -->
    <link rel="stylesheet" href="../productSource/productStyle.css"> <!--모든 상품들이 이 스타일을 사용하기 때문에 따로 둠-->
    <link rel="stylesheet" href="../homebutton/homebuttonStyle.css"> <!-- 홈 버튼 디자인 -->
    <script src="../../tabClock/tabClock.js"></script>
    <script src="../productSource/productMethod.js"></script>
</head>
<body>
    <div class="top">
        <a href="../../main.html">
            <img src="../../image/logoimage.png">
        </a>
        <ul class="label">
            <li class="tab"><a href="../mechanicalPencilCategory.html">샤프</a></li>
            <li class="tab"><a href="../ballpointPenCategory.html">볼펜</a></li>
            <li class="tab"><a href="../fountainPenCategory.html">만년필</a></li>
            <li class="tab"><a href="../notebookCategory.html">공책</a></li>
            <li class="tab"><a href="../eraserCategory.html">지우개</a></li>
        </ul>
    </div>

    <div class = "second">
    </div>

    <div id="time">
        <p id="year_month_day_week"></p>
        <p id="hour_minute_second"></p>
    </div>
    <!--홈 버튼 부분-->
    <a href="../../main.html">
        <div id="home">
            <img id="home-button" src="../homebutton/home.png">
            <h2>홈으로</h2>
        </div>  
    </a>
    <div id="text-body">
        <p id="title">상세 정보</p>
        <hr>
        <div id="product-container">
        <img id="product" src="../image/lamy2000.png" alt="라미 2000 만년필 이미지">
        <p id="product-name"></p>
        <p id="product-name">라미 2000</p>
        <table id="info">
            <tr>
                <th>브랜드</th>
                <td><a href="https://lamyshop.kr/"><img src="../brandlogo/lamy_logo.png" alt="라미 로고" width="320" height="100"></a>
                    <p>라미</p></td>
            </tr>
            <tr>
                <th>사이즈</th>
                <td>14mm * 139mm (두깨 * 길이)</td>
            </tr>
            <tr>
                <th>무게</th>
                <td>21.8g</td>
            </tr>
            <tr>
                <th>닙 종류</th>
                <td>EF촉, F촉</td>
            </tr>
            <tr>
                <th>닙 재질</th>
                <td>14k 플래티늄 코팅 금촉</td>
            </tr>
            <tr>
                <th>제조국</th>
                <td>독일</td>
            </tr>
            <tr>
                <th>색깔 종류</th>
                <td id="color">
                    <div class="fig" style="background:rgb(17, 26, 24)"></div><span>마크롤론</span>
                    <div class="fig" style="background:rgb(202, 205, 205)"></div><span>실버</span>
                </td>
            </tr>
        </table>
        </div>

        <div id="description">
            <h1 align="center">제품 특징</h1>
            <ul>
                <li>라미사를 대표하는 하이엔드 만년필</li>
                <li>더 오래가는 내구성과 편안한 필기감을 위한 완벽한 소재</li>
                <li>간결하고 심플한 형태의 스테인리스 스틸 클립</li>
                <li>고급스러운 스테인리스 스틸(실버) 또는 폴리카보네이트(마크롤론) 바디</li>
            </ul>
        </div>

        <div id="select-product">
            <h3 align="center">제품 사진</h3><br>
            <input class="select-button" onclick="selectProduct(this, './image/lamy2000black.png')" type="button" value="마크롤론"><!--버튼 클릭시 자기 객체 넣기-->
            <input class="select-button" onclick="selectProduct(this, './image/lamy2000silver.png')" type="button" value="실버">
            <div id="selected-image">
                <img id="show" src="https://dummyimage.com/700x500/fff&text=Select+Picture" height="500px" alt="선택된 제품 이미지">
                <!--더미 이미지에 원하는 텍스트를 넣을 수 있다(한국어는 불가)-->
            </div>
        </div>
        

        <input type="button" id="back-button" value="뒤로 가기" onclick="location.href='../fountainPenCategory.html'">
    </div>


</body>
</html>
