<body>
    <div class="top">
        <a href="../../main.html">
            <img src="../../image/logoimage.png">
        </a>
        <ul class="label">
            <li class="tab"><a href="../mechanicalPencilCategory.html">샤프</a></li>
            <li class="tab"><a href="../ballpointPenCategory.html">볼펜</a></li>
            <li class="tab"><a href="../fountainPenCategory.html">만년필</a></li>
            <li class="tab"><a href="../notebookCategory.html">공책</a></li>
            <li class="tab"><a href="../eraserCategory.html">지우개</a></li>
        </ul>

    <div class = "second">
    </div>

    <div id="time">
        <p id="year_month_day_week"></p>
        <p id="hour_minute_second"></p>
    </div>
    <!--홈 버튼 부분-->
    <a href="../../main.html">
        <div id="home">
            <img id="home-button" src="../homebutton/home.png">
            <h2>홈으로</h2>
        </div>
    </a>
    <div id="text-body">
        <p id="title">상세 정보</p>
        <hr>
        <div id="product-container">
        <img id="product" src="../image/smash.png" alt="스매쉬 이미지">
        <p id="product-name"></p>
        <p id="product-name">스매쉬</p>
        <table id="info">
            <tr>
                <th>브랜드</th>
                <td><a href="https://www.pentel.co.jp/"><img src="../brandlogo/pentel_logo.png" alt="펜텔 로고" width="320" height="110"></a>
                    <p>펜텔</p></td>
            </tr>
            <tr>
                <th>사이즈</th>
                <td>12mm * 138mm (두깨 * 길이)</td>
            </tr>
            <tr>
                <th>무게</th>
                <td>13g</td>
            </tr>
            <tr>
                <th>심 종류</th>
                <td>0.3mm, 0.5mm</td>
            </tr>
            <tr>
                <th>제조국</th>
                <td>일본</td>
            </tr>
        </table>
        </div>

        <div id="description">
            <h1 align="center">제품 특징</h1>
            <ul>
                <li>터프하게 쓸 수 있는 일체형 설계</li>
                <li>프로 사양의 금속 척</li>
                <li>쇼크 업소버를 이미지화하여 터프함을 연출</li>
                <li>매트한 질감의 듀얼 그립</li>
            </ul>
        </div>

        <div id="select-product">
            <h3 align="center">제품 사진</h3><br>
            <input class="select-button" onclick="selectProduct(this, './image/smash0.3.png')" type="button" value="0.3mm"><!--버튼 클릭시 자기 객체 넣기-->
            <input class="select-button" onclick="selectProduct(this, './image/smash0.5.png')" type="button" value="0.5mm">
            <div id="selected-image">
                <img id="show" src="https://dummyimage.com/700x500/fff&text=Select+Picture" height="500px" alt="선택된 제품 이미지">
                <!--더미 이미지에 원하는 텍스트를 넣을 수 있다(한국어는 불가)-->
            </div>
        </div>

        

        <input type="button" id="back-button" value="뒤로 가기" onclick="location.href='../mechanicalPencilCategory.html'">
    </div>
