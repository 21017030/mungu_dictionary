    <link rel="stylesheet" href="../categorySource/textBodyStyle.css"> <!-- 본문 내용 디자인 -->
    <link rel="stylesheet" href="../productSource/productStyle.css"> <!--모든 상품들이 이 스타일을 사용하기 때문에 따로 둠-->
    <link rel="stylesheet" href="../homebutton/homebuttonStyle.css"> <!-- 홈 버튼 디자인 -->
    <script src="../../tabClock/tabClock.js"></script>
    <script src="../productSource/productMethod.js"></script>
</head>
<body>
    <div class="top">
        <a href="../../main.html">
            <img src="../../image/logoimage.png">
        </a>
        <ul class="label">
            <li class="tab"><a href="../mechanicalPencilCategory.html">샤프</a></li>
            <li class="tab"><a href="../ballpointPenCategory.html">볼펜</a></li>
            <li class="tab"><a href="../fountainPenCategory.html">만년필</a></li>
            <li class="tab"><a href="../notebookCategory.html">공책</a></li>
            <li class="tab"><a href="../eraserCategory.html">지우개</a></li>
        </ul>
    </div>

    <div class = "second">
    </div>

    <div id="time">
        <p id="year_month_day_week"></p>
        <p id="hour_minute_second"></p>
    </div>
    <!--홈 버튼 부분-->
    <a href="../../main.html">
        <div id="home">
            <img id="home-button" src="../homebutton/home.png">
            <h2>홈으로</h2>
        </div>
    </a>
    <div id="text-body">
        <p id="title">상세 정보</p>
        <hr>
        <div id="product-container">
        <img id="product" src="../image/p205.png" alt="P20x 이미지">
        <p id="product-name"></p>
        <p id="product-name">P20x</p>
        <table id="info">
            <tr>
                <th>브랜드</th>
                <td><a href="https://www.pentel.co.jp/"><img src="../brandlogo/pentel_logo.png" alt="펜텔 로고" width="320" height="110"></a>
                    <p>펜텔</p></td>
            </tr>
            <tr>
                <th>사이즈</th>
                <td>13mm * 143mm (두깨 * 길이)</td>
            </tr>
            <tr>
                <th>무게</th>
                <td>10g</td>
            </tr>
            <tr>
                <th>심 종류</th>
                <td>0.3mm, 0.5mm, 0.7mm, 0.9mm</td>
            </tr>
            <tr>
                <th>제조국</th>
                <td>일본</td>
            </tr>
            <tr>
                <th>색깔 종류(굵기에 따라 다름)</th>
                <td id="color">
                <div class="fig" style="background:rgb(0, 0, 0)"></div><span>블랙</span>
                <div class="fig" style="background:rgb(250, 250, 250); border: 1px solid black;"></div><span>화이트</span>
                <div class="fig" style="background:rgb(16, 114, 177)"></div><span>블루</span>
                <div class="fig" style="background:rgb(224, 174, 87)"></div><span>옐로우</span>
                <div class="fig" style="background:rgb(143, 85, 74)"></div><span>브라운</span>
                </td>
            </tr>
        </table>
        </div>

        <div id="description">
            <h1 align="center">제품 특징</h1>
            <ul>
                <li>견고한 클립</li>
                <li>요철형 그립과 다각형 바디</li>
                <li>플라스틱 배럴</li>
                <li>우리나라의 1000원짜리 제도 샤프의 원조</li>
            </ul>
        </div>

        <div id="select-product">
            <h3 align="center">제품 사진</h3><br>
            <input class="select-button" onclick="selectProduct(this, './image/p203.png')" type="button" value="0.3mm"><!--버튼 클릭시 자기 객체 넣기-->
            <input class="select-button" onclick="selectProduct(this, './image/p205.png')" type="button" value="0.5mm">
            <input class="select-button" onclick="selectProduct(this, './image/p207.png')" type="button" value="0.7mm">
            <input class="select-button" onclick="selectProduct(this, './image/p209.png')" type="button" value="0.9mm">
            <div id="selected-image">
                <img id="show" src="https://dummyimage.com/700x500/fff&text=Select+Picture" width="700px" style="margin-top:100px" alt="선택된 제품 이미지">
                <!--더미 이미지에 원하는 텍스트를 넣을 수 있다(한국어는 불가)-->
            </div>
        </div>

        

        <input type="button" id="back-button" value="뒤로 가기" onclick="location.href='../mechanicalPencilCategory.html'">
    </div>
