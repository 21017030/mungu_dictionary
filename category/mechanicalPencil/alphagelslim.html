            <tr>

            <ul>
                <li>한번 쓰면 계속 쓰고싶은, 말랑~쫀득한 그립의 알파겔 슬림샤프</li>
                <li>충격흡수 겔 소재를 그립부분에 사용하여, 그립이 개개인의 손에 맞추어져장시간 필기에도 끄떡없는 편안한 그립감을 발휘합니다.</li>
            </ul>
        </div>

            <input class="select-button" onclick="selectProduct(this, './image/slimblue.png')" type="button" value="로얄블루">
            <input class="select-button" onclick="selectProduct(this, './image/slimgreen.png')" type="button" value="옐로우그린">
